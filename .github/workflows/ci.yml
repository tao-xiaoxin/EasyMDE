name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  php-lint:
    name: PHP lint (${{ matrix.php-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '7.4'
          - '8.3'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Lint PHP files
        run: git ls-files -z -- '*.php' | xargs -0 -n1 php -l

  composer:
    name: Composer validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Validate Composer metadata
        run: composer validate --no-interaction --no-check-publish --strict

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

  wpcs:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run WPCS
        run: composer run lint:phpcs

  phpunit:
    name: PHPUnit (${{ matrix.php-version }} / WordPress ${{ matrix.wordpress-version }})
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: easymde_phpunit
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=root --password=root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '7.4'
            wordpress-version: '6.7'
          - php-version: '8.3'
            wordpress-version: 'latest'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mysqli
          tools: composer:v2
          coverage: none

      - name: Install test tools
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client subversion

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install WordPress test suite
        run: scripts/install-wp-tests.sh easymde_phpunit root root 127.0.0.1:3306 ${{ matrix.wordpress-version }}

      - name: Run PHPUnit
        run: composer run test:phpunit

  node:
    name: Node validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install gettext and ZIP tools
        run: sudo apt-get update && sudo apt-get install -y gettext zip unzip

      - name: Install Node dependencies
        run: npm ci

      - name: Check local runtime assets
        run: npm run assets:check

      - name: Check frontend build contract
        run: npm run frontend:check

      - name: Check JavaScript syntax
        run: git ls-files -z -- '*.js' '*.mjs' | xargs -0 -n1 node --check

      - name: Check i18n files
        run: npm run i18n:check

      - name: Check third-party notices
        run: npm run notices:check

      - name: Run Node tests
        run: npm test

  wordpress-i18n:
    name: WordPress i18n runtime
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: easymde_i18n
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=root --password=root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysqli
          tools: composer:v2
          coverage: none

      - name: Install WP-CLI
        run: bash scripts/install-wp-cli.sh

      - name: Install PHP runtime dependencies
        run: composer install --no-dev --no-interaction --no-progress --prefer-dist

      - name: Install WordPress
        run: |
          mkdir -p /tmp/easymde-wp
          wp core download --path=/tmp/easymde-wp --force
          wp config create --path=/tmp/easymde-wp --dbname=easymde_i18n --dbuser=root --dbpass=root --dbhost=127.0.0.1:3306 --skip-check
          wp core install --path=/tmp/easymde-wp --url=http://example.test --title=EasyMDE --admin_user=admin --admin_password=password --admin_email=admin@example.test

      - name: Activate EasyMDE and verify bundled translations
        run: |
          ln -s "$GITHUB_WORKSPACE" /tmp/easymde-wp/wp-content/plugins/easymde
          wp plugin activate easymde --path=/tmp/easymde-wp
          wp eval-file "$GITHUB_WORKSPACE/scripts/verify-wordpress-i18n.php" --path=/tmp/easymde-wp

  release:
    name: Release package validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install release tools
        run: sudo apt-get update && sudo apt-get install -y gettext zip unzip

      - name: Install PHP runtime dependencies
        run: composer install --no-dev --no-interaction --no-progress --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: Check local runtime assets
        run: npm run assets:check

      - name: Check frontend build contract
        run: npm run frontend:check

      - name: Check i18n files
        run: npm run i18n:check

      - name: Check third-party notices
        run: npm run notices:check

      - name: Resolve release metadata
        id: release-metadata
        run: |
          checkout_sha="$(git rev-parse HEAD)"
          version="$(node --input-type=module -e "import { readReleaseVersions } from './scripts/build-release.mjs'; console.log(readReleaseVersions().pluginHeader);")"
          case "${version}" in
            ""|*[!0-9A-Za-z._-]*)
              echo "Resolved plugin version is not safe for artifact filenames." >&2
              exit 1
              ;;
          esac
          {
            echo "checkout_sha=${checkout_sha}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Build release package
        run: npm run build:release

      - name: Build source archives
        run: npm run build:source-archives

      - name: Verify release artifacts
        env:
          PLUGIN_VERSION: ${{ steps.release-metadata.outputs.version }}
        run: |
          source_zip="dist/EasyMDE-${PLUGIN_VERSION}-source.zip"
          source_tar_gz="dist/EasyMDE-${PLUGIN_VERSION}-source.tar.gz"
          plugin_zip="dist/EasyMDE.zip"
          test -f "${source_zip}"
          test -f "${source_tar_gz}"
          test -f "${plugin_zip}"
          unzip -t "${source_zip}"
          tar -tzf "${source_tar_gz}" > /dev/null
          unzip -t "${plugin_zip}"

      - name: Summarize release artifacts
        env:
          CHECKOUT_SHA: ${{ steps.release-metadata.outputs.checkout_sha }}
          PLUGIN_VERSION: ${{ steps.release-metadata.outputs.version }}
        run: |
          source_zip="dist/EasyMDE-${PLUGIN_VERSION}-source.zip"
          source_tar_gz="dist/EasyMDE-${PLUGIN_VERSION}-source.tar.gz"
          plugin_zip="dist/EasyMDE.zip"
          {
            echo "### Release artifacts"
            echo
            echo "| Checkout SHA | Version | Artifact | Payload | Byte size | SHA-256 |"
            echo "| --- | --- | --- | --- | ---: | --- |"
            for row in \
              "source-code-zip:${source_zip}" \
              "source-code-tar-gz:${source_tar_gz}" \
              "easymde-plugin-zip:${plugin_zip}"
            do
              artifact="${row%%:*}"
              payload="${row#*:}"
              filename="$(basename "${payload}")"
              size="$(wc -c < "${payload}" | tr -d ' ')"
              sha256="$(sha256sum "${payload}" | awk '{print $1}')"
              echo "| ${CHECKOUT_SHA} | ${PLUGIN_VERSION} | \`${artifact}\` | \`${filename}\` | ${size} | \`${sha256}\` |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload source code ZIP
        uses: actions/upload-artifact@v4
        with:
          name: source-code-zip
          path: dist/EasyMDE-${{ steps.release-metadata.outputs.version }}-source.zip
          if-no-files-found: error

      - name: Upload source code tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: source-code-tar-gz
          path: dist/EasyMDE-${{ steps.release-metadata.outputs.version }}-source.tar.gz
          if-no-files-found: error

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: easymde-plugin-zip
          path: dist/EasyMDE.zip
          if-no-files-found: error

  plugin-check:
    name: Plugin Check on release ZIP
    runs-on: ubuntu-latest
    needs: release

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: easymde_plugin_check
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=root --password=root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysqli
          tools: composer:v2
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install release tools
        run: sudo apt-get update && sudo apt-get install -y gettext zip unzip default-mysql-client

      - name: Install WP-CLI
        run: bash scripts/install-wp-cli.sh

      - name: Download release ZIP
        uses: actions/download-artifact@v4
        with:
          name: easymde-plugin-zip
          path: dist

      - name: Generate temporary WordPress test credentials
        run: |
          password="$(openssl rand -hex 24)"
          echo "EASYMDE_E2E_USER_PASSWORD=$password" >> "$GITHUB_ENV"
          echo "EASYMDE_WP_ADMIN_PASSWORD=$password" >> "$GITHUB_ENV"

      - name: Install release ZIP and run Plugin Check
        env:
          EASYMDE_DB_NAME: easymde_plugin_check
          EASYMDE_DB_USER: root
          EASYMDE_DB_PASS: root
          EASYMDE_DB_HOST: 127.0.0.1:3306
          EASYMDE_WP_PATH: /tmp/easymde-plugin-check-wp
          EASYMDE_WP_URL: http://example.test
        run: scripts/run-plugin-check.sh dist/EasyMDE.zip

  e2e:
    name: Playwright Chromium E2E
    runs-on: ubuntu-latest
    needs: release

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: easymde_e2e
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=root --password=root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysqli
          tools: composer:v2
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install E2E tools
        run: sudo apt-get update && sudo apt-get install -y gettext zip unzip default-mysql-client

      - name: Install WP-CLI
        run: bash scripts/install-wp-cli.sh

      - name: Install PHP runtime dependencies
        run: composer install --no-dev --no-interaction --no-progress --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate temporary WordPress test credentials
        run: |
          password="$(openssl rand -hex 24)"
          echo "EASYMDE_E2E_USER_PASSWORD=$password" >> "$GITHUB_ENV"
          echo "EASYMDE_WP_ADMIN_PASSWORD=$password" >> "$GITHUB_ENV"

      - name: Download release ZIP
        uses: actions/download-artifact@v4
        with:
          name: easymde-plugin-zip
          path: dist

      - name: Install release ZIP into clean WordPress
        env:
          EASYMDE_DB_NAME: easymde_e2e
          EASYMDE_DB_USER: root
          EASYMDE_DB_PASS: root
          EASYMDE_DB_HOST: 127.0.0.1:3306
          EASYMDE_WP_PATH: /tmp/easymde-e2e-wp
          EASYMDE_WP_URL: http://127.0.0.1:8089
        run: scripts/setup-wordpress-release.sh dist/EasyMDE.zip

      - name: Start WordPress server
        run: |
          wp server --path=/tmp/easymde-e2e-wp --host=127.0.0.1 --port=8089 > /tmp/easymde-wp-server.log 2>&1 &
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8089/wp-login.php >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/easymde-wp-server.log
          exit 1

      - name: Run Playwright Chromium E2E
        env:
          EASYMDE_E2E_BASE_URL: http://127.0.0.1:8089
          EASYMDE_E2E_WP_PATH: /tmp/easymde-e2e-wp
        run: npm run test:e2e

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: |
            test-results/playwright
            test-results/playwright-junit.xml
          if-no-files-found: ignore
